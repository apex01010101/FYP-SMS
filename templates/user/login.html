{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.2/css/all.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <title>SMS — Login</title>
    <style>
        body { background: #343a40; font-family: 'Poppins', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-wrap { width: 100%; max-width: 420px; }
        .login-header { background: #212529; padding: 28px 20px; text-align: center; color: #fff; border-radius: 14px 14px 0 0; }
        .login-header h3 { font-weight: 700; margin: 0; }
        .login-header small { color: #adb5bd; }
        .login-body { background: #fff; padding: 32px; }
        .login-footer { background: #f8f9fa; padding: 14px; text-align: center; font-size: 13px; color: #6c757d; border-radius: 0 0 14px 14px; border-top: 1px solid #eee; }
        .form-control { border-radius: 8px; border: 1.5px solid #ced4da; padding: 10px 14px; font-size: 14px; }
        .form-control:focus { border-color: #007bff; box-shadow: 0 0 0 .15rem rgba(0,123,255,.2); }
        .btn-login { background: #007bff; border: none; border-radius: 8px; padding: 11px; font-size: 15px; font-weight: 600; width: 100%; color: #fff; margin-top: 6px; }
        .btn-login:hover { background: #0056b3; color: #fff; }
        label { font-size: 13px; font-weight: 500; color: #444; }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-header">
        <i class="fas fa-boxes fa-2x mb-2" style="color:#4099ff;"></i>
        <h3>SMS</h3>
        <small>Inventory Management System</small>
    </div>
    <div class="login-body">
        {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-{% if msg.tags == 'error' %}danger{% else %}success{% endif %} py-2" style="font-size:13px;">
            {{ msg }}
        </div>
        {% endfor %}
        {% endif %}
        <form method="POST" action="{% url 'user-login' %}">
            {% csrf_token %}
            <div class="form-group mb-3">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus required>
            </div>
            <div class="form-group mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt mr-2"></i>Login
            </button>
        </form>
    </div>
    <div class="login-footer">
        SMS Inventory &amp; Sales Management System
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
